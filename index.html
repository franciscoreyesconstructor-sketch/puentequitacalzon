<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA SERRA - VISOR V5.9+</title>
    <link rel="stylesheet" href="style.css?v=5.9">
    <style>
        /* Estilos rápidos para la nueva pantalla de secuencia */
        .pantalla-secuencia {
            display: none; 
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            color: white;
            z-index: 1000;
            text-align: center;
            padding-top: 20%;
        }
        .btn-abrir-secuencia {
            background: #ffcc00;
            color: black;
            font-weight: bold;
            padding: 12px;
            width: 100%;
            border: none;
            cursor: pointer;
        }
        .cerrar-secuencia {
            background: red;
            color: white;
            padding: 10px 20px;
            margin-top: 30px;
            border: none;
            border-radius: 5px;
        }
        .numero-paso {
            font-size: 80px;
            display: block;
            color: #ffcc00;
        }
    </style>
</head>
<body>
    <div class="app-movil">
        <div class="contenedor-herramientas">
            <select id="filtro-modulo">
                <option value="todos">📦 Módulo (Todos)</option>
            </select>
            <button class="btn-abrir-secuencia" onclick="abrirSecuencia()">📌 VER SECUENCIA DE MONTAJE</button>
        </div>

        <div class="visor-imagenes">
            <div class="contenedor-img mapa">
                <div class="etiqueta-flotante">PLANO UBICACIÓN</div>
                <img id="img-mapa" src="" alt="Plano">
            </div>
            <div class="contenedor-img foto">
                <div class="etiqueta-flotante">FOTO PIEZA</div>
                <img id="img-visor" src="" alt="Foto">
            </div>
        </div>

        <div class="cuerpo-datos">
            <h2 id="pieza-titulo">PIEZA: --</h2>
            </div>

        <div class="controles">
            <button id="btn-atras" class="btn-nav">ANTERIOR</button>
            <span id="indicador-indice">0 / 0</span>
            <button id="btn-siguiente" class="btn-nav">SIGUIENTE</button>
        </div>
    </div>

    <div id="pantalla-paso" class="pantalla-secuencia">
        <h3>SECUENCIA DE MONTAJE</h3>
        <p>PARA LA PIEZA ACTUAL:</p>
        <span id="valor-paso-grande" class="numero-paso">--</span>
        <button class="cerrar-secuencia" onclick="cerrarSecuencia()">VOLVER AL VISOR</button>
    </div>

    <script src="script.js?v=5.9"></script>
</body>
</html>
