<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SERRA V7 - PINCH ZOOM PRO</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/pinch-zoom-js@2.3.4/dist/pinch-zoom.umd.min.js"></script>
</head>
<body>
    <div id="modal-mapa-general" style="display:none; background:#000; height:100vh; width:100%; position:fixed; z-index:2000; flex-direction:column; top:0; left:0;">
        <div style="padding:15px; background:#111; display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid #ffcc00;">
            <h3 style="color:#ffcc00; font-size:14px;">PLANO GENERAL (PELLIZCAR)</h3>
            <button onclick="cerrarMapaGeneral()" style="background:#ffcc00; border:none; padding:12px 20px; font-weight:bold; border-radius:8px;">CERRAR</button>
        </div>
        <div id="wrapper-general" style="flex-grow:1; overflow:hidden; position:relative;">
            <img id="img-ubimod" src="" style="width:100%; height:100%; object-fit:contain;">
        </div>
    </div>

    <div class="app-movil">
        <header class="contenedor-herramientas">
            <select id="filtro-modulo">
                <option value="todos">📦 CARGANDO...</option>
            </select>
        </header>

        <section class="visor-imagenes">
            <div class="contenedor-img">
                <div class="etiqueta-flotante">UBICACIÓN</div>
                <div id="wrapper-plano" style="width:100%; height:100%; overflow:hidden;">
                    <img id="img-mapa" src="" style="width:100%; height:100%; object-fit:contain;">
                </div>
            </div>
            <div class="contenedor-img">
                <div class="etiqueta-flotante">PIEZA</div>
                <div id="wrapper-foto" style="width:100%; height:100%; overflow:hidden;">
                    <img id="img-visor" src="" style="width:100%; height:100%; object-fit:contain;">
                </div>
            </div>
        </section>

        <main class="cuerpo-datos">
            <h2 id="pieza-titulo">PIEZA: --</h2>
            <div class="tarjeta-info">
                <div class="fila-dato"><span>🔩 Perno:</span> <strong id="dato-perno">--</strong></div>
                <div class="fila-dato"><span>⚙️ Estándar:</span> <strong id="dato-estandar">--</strong></div>
                <div class="caja-torque">
                    <small>TORQUE REQUERIDO</small>
                    <div><span id="dato-torque">0</span> <small>N.m</small></div>
                </div>
                <div class="posicion-detallada">
                    <strong>UBICACIÓN:</strong> <span id="dato-modulo-linea">--</span><br>
                    <strong>POSICIÓN:</strong> <span id="dato-posicion-pieza">--</span>
                </div>
            </div>
        </main>

        <footer class="controles-unificados">
            <div class="fila-navegacion">
                <button id="btn-atras" class="btn-nav">« ANTERIOR</button>
                <div id="indicador-indice">0 / 0</div>
                <button id="btn-siguiente" class="btn-nav">SIGUIENTE »</button>
            </div>
            <button class="btn-mapa" onclick="mostrarMapaGeneral()">🗺️ VER PLANO GENERAL</button>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
