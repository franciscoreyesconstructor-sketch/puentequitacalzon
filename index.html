<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA SERRA - VISOR V7 TOTAL ZOOM</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/pinch-zoom-js@2.3.4/dist/pinch-zoom.umd.min.js"></script>
</head>
<body>
    <div id="modal-mapa-general" style="display:none; background:#000; height:100vh; width:100%; position:fixed; z-index:2000; flex-direction:column; top:0; left:0;">
        <div style="padding:15px; background:#222; display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid #ffcc00;">
            <h3 style="color:#ffcc00; font-size:14px;">PLANO GENERAL (PELLIZCAR)</h3>
            <button onclick="cerrarMapaGeneral()" style="background:#ffcc00; border:none; padding:10px 15px; font-weight:bold; border-radius:5px; color:#000;">CERRAR</button>
        </div>
        <div id="zoom-general" style="flex-grow:1; overflow:hidden; position:relative;">
            <img id="img-ubimod" src="" style="width:100%; height:100%; object-fit:contain;">
        </div>
    </div>

    <div class="app-movil">
        <div class="contenedor-herramientas">
            <select id="filtro-modulo">
                <option value="todos">📦 Módulo (Todos)</option>
            </select>
        </div>

        <div class="visor-imagenes">
            <div class="contenedor-img">
                <div class="etiqueta-flotante">PLANO UBICACIÓN</div>
                <div id="zoom-plano" style="width:100%; height:100%; overflow:hidden;">
                    <img id="img-mapa" src="" style="width:100%; height:100%; object-fit:contain;">
                </div>
            </div>
            <div class="contenedor-img">
                <div class="etiqueta-flotante">FOTO PIEZA</div>
                <div id="zoom-foto" style="width:100%; height:100%; overflow:hidden;">
                    <img id="img-visor" src="" style="width:100%; height:100%; object-fit:contain;">
                </div>
            </div>
        </div>

        <div class="cuerpo-datos">
            <h2 id="pieza-titulo">PIEZA: --</h2>
            <div class="seccion-montaje">
                <div class="dato"><strong>🔩 Perno:</strong> <span id="dato-perno">--</span></div>
                <div class="dato-torque"><strong>🔧 Torque:</strong> <span id="dato-torque">0</span> <small>N.m</small></div>
                <div class="dato-modulo-info">
                    <strong>📦 UBICACIÓN:</strong> <span id="dato-modulo-linea">MÓDULO --</span><br>
                    <strong>📍 POSICIÓN PIEZA:</strong> <span id="dato-posicion-pieza">--</span>
                </div>
            </div>
        </div>

        <div class="controles-unificados">
            <div class="fila-navegacion">
                <button id="btn-atras" class="btn-nav">ANTERIOR</button>
                <span id="indicador-indice">0 / 0</span>
                <button id="btn-siguiente" class="btn-nav">SIGUIENTE</button>
            </div>
            <button id="btn-mapa-general" class="btn-mapa" onclick="mostrarMapaGeneral()">🗺️ VER PLANO GENERAL PUENTE</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
