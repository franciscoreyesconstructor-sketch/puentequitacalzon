<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MONTAJE PUENTE QUITACALZÓN</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/pinch-zoom-js@2.3.4/dist/pinch-zoom.umd.min.js"></script>
</head>
<body>
    <div id="modal-zoom-detallado" class="modal-zoom">
        <div class="header-modal">
            <h3 id="titulo-zoom-modal">INSPECCIÓN</h3>
            <button onclick="cerrarZoomDetalle()" class="btn-cerrar">VOLVER</button>
        </div>
        <div id="wrapper-zoom-detalle" class="wrapper-zoom">
            <img id="img-zoom-full" src="" alt="Zoom">
        </div>
    </div>

    <div class="app-movil">
        <header class="contenedor-herramientas">
            <select id="filtro-modulo">
                <option value="todos">📦 CARGANDO...</option>
            </select>
        </header>

        <section class="visor-imagenes">
            <div id="indicador-paso-flotante">PASO<br><span id="num-paso">1</span></div>
            
            <div class="contenedor-img" onclick="abrirZoomDetalle('img-mapa', 'UBICACIÓN')">
                <div class="etiqueta-flotante">UBICACIÓN</div>
                <img id="img-mapa" src="" alt="Mapa">
            </div>
            <div class="contenedor-img" onclick="abrirZoomDetalle('img-visor', 'PIEZA')">
                <div class="etiqueta-flotante">PIEZA</div>
                <img id="img-visor" src="" alt="Pieza">
            </div>
        </section>

        <main class="cuerpo-datos">
            <h2 id="pieza-titulo">PIEZA: --</h2>
            
            <div class="tarjeta-info">
                <div class="fila-dato"><span>🔩 Perno:</span> <strong id="dato-perno">--</strong></div>
                <div class="fila-dato"><span>⚙️ Estándar tuerca:</span> <strong id="dato-estandar">--</strong></div>
                
                <div class="caja-torque">
                    <small>TORQUE REQUERIDO</small>
                    <div><span id="dato-torque">0</span> <small>N.m</small></div>
                </div>

                <div class="seccion-medidas">
                    <div class="caja-medida"><small>LARGO</small><span id="dato-largo">0</span></div>
                    <div class="caja-medida"><small>ANCHO</small><span id="dato-ancho">0</span></div>
                    <div class="caja-medida"><small>ALTO</small><span id="dato-alto">0</span></div>
                </div>
                
                <div class="posicion-detallada">
                    <strong>MÓDULO:</strong> <span id="dato-modulo-linea">--</span><br>
                    <strong>POSICIÓN PIEZA:</strong> <span id="dato-posicion-pieza">--</span>
                </div>
            </div>
        </main>

        <footer class="controles-unificados">
                    <div class="fila-navegacion">
                        <button id="btn-atras" class="btn-nav">ANTERIOR</button>
                        <div id="indicador-indice">0 / 0</div>
                        <button id="btn-siguiente" class="btn-nav">SIGUIENTE</button>
                    </div>
                    
                    <button class="btn-mapa" onclick="abrirZoomDetalle('img-ubimod-hidden', 'PLANO GENERAL')">🗺️ PLANO GENERAL</button>
                    
                    <button class="btn-manual" onclick="abrirManual()">📕 MANUAL DE MONTAJE (PDF)</button>
                    
                    <img id="img-ubimod-hidden" src="fotos/ubimod.jpg" style="display:none;">
                </footer>
            </div>
            <script src="script.js"></script>
</body>
</html>
